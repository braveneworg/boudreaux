AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fake Four Records - AI artist bio generator

Globals:
  Function:
    # Lambda's hard ceiling (15 minutes): headroom for metadata + always-on web
    # search + the draft-and-synthesize ensemble (two parallel drafts plus an
    # editor pass, each with up to 90s of 429 backoff). Invoked directly (not
    # via API Gateway), so the 29s gateway limit does not apply. The web app's
    # invoke client uses a matching (larger) request timeout so it waits this out.
    Timeout: 900
    # 1024 MB: cap-240 base64 image retention can reach ~480 MB peak; 1 GB gives
    # safe headroom and also doubles available CPU allocation vs 512 MB.
    MemorySize: 1024
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_ENV: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  AlarmEmail:
    Type: String
    Default: ''
    Description: Email for Lambda error alarm notifications (empty disables them)

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Resources:
  BioGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fakefour-bio-generator
      CodeUri: src/
      Handler: handler.lambdaHandler
      Description: Generates short/long artist bios from MusicBrainz + Wikidata + Gemini
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/gemini/api-key'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/jina/api-key'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/serper/api-key'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          SSM_PATH_GEMINI_API_KEY: '/fakefour/gemini/api-key'
          # Optional Jina (web scrape) key. Jina works keyless at a lower rate
          # limit, so an absent parameter just means unauthenticated scraping.
          SSM_PATH_JINA_API_KEY: '/fakefour/jina/api-key'
          # Optional Serper (Google Images) key. Serper requires a key, so an
          # absent parameter simply skips the Serper image search entirely.
          SSM_PATH_SERPER_API_KEY: '/fakefour/serper/api-key'
          # The Gemini model ids intentionally ship in code (DEFAULT_GEMINI_MODEL /
          # DEFAULT_GEMINI_PRO_MODEL, src/types.ts) rather than template parameters:
          # CloudFormation keeps a parameter's previous value across deploys, which
          # once pinned a retired model id in production. Set GEMINI_MODEL or
          # GEMINI_PRO_MODEL here (or in the console) only as temporary emergency
          # overrides — never as permanent CloudFormation parameters.
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2024
        Format: esm
        OutExtension:
          - .js=.mjs
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - '@aws-sdk/*'

  # Bio generation is admin-triggered and non-critical, so this alarm fires on
  # the first error in any 15 minutes purely for visibility.
  BioGeneratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Artist bio generator Lambda is failing
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BioGeneratorFunction
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], []]

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: fakefour-bio-generator-alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

Outputs:
  FunctionName:
    Description: Set this as BIO_GENERATOR_LAMBDA_NAME in the web app environment
    Value: !Ref BioGeneratorFunction
  FunctionArn:
    Value: !GetAtt BioGeneratorFunction.Arn
