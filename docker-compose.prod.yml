services:
  website:
    image: "${NEXT_APP_WEBSITE_IMAGE}"
    container_name: website
    restart: unless-stopped
    # ─── Runtime hardening ──────────────────────────────────────────────────
    # - no-new-privileges blocks in-container privilege escalation via suid.
    # - read_only filesystem forces any writes through an explicit tmpfs mount
    #   (required for upload temp files, see /tmp below).
    # - cap_drop ALL + targeted cap_add prevents container processes from
    #   acquiring kernel capabilities they don't need.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=1024m,mode=1777
    # Constrain resource usage to prevent a single container from exhausting
    # host CPU/memory under abuse. Tune to the host.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: ${NEXT_PUBLIC_CLOUDFLARE_SITE_KEY}
      CLOUDFLARE_SECRET: ${CLOUDFLARE_SECRET}
      NEXT_TELEMETRY_DISABLED: 1
      # Public base URL (used for audio metadata comments, emails, etc.)
      NEXT_PUBLIC_HOST_NAME: ${NEXT_PUBLIC_HOST_NAME}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      # AWS S3 configuration for file uploads
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      CDN_DOMAIN: ${CDN_DOMAIN}
      # Stripe subscription payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PRICE_MINIMUM: ${NEXT_PUBLIC_STRIPE_PRICE_MINIMUM}
      NEXT_PUBLIC_STRIPE_PRICE_EXTRA: ${NEXT_PUBLIC_STRIPE_PRICE_EXTRA}
      NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA: ${NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA}
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: "${NEXT_APP_NGINX_IMAGE}"
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - website
    restart: always
    networks:
      - app-network
    # nginx needs to write its pid file, cache files, and tmp uploads to disk.
    # Keep a read-only root FS and selectively mount tmpfs for writable paths.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run:mode=1777
      - /var/cache/nginx:mode=1777
      - /tmp:mode=1777
    # nginx must bind :80/:443 as a non-root user; alpine's nginx runs master
    # as root by default. Drop everything except NET_BIND_SERVICE so the
    # master can open privileged ports but nothing else.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    volumes:
      - ./certbot-webroot:/var/www/certbot:rw
    secrets:
      - ssl_cert
      - ssl_key

networks:
  app-network:
    driver: bridge
secrets:
  ssl_cert:
    file: ./certificate.pem
  ssl_key:
    file: ./private_key.pem
