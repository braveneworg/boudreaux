# ─── HTTP-context directives ────────────────────────────────────────────────
# This file is included inside nginx's http { } block via the default
# /etc/nginx/conf.d/ include in the upstream nginx image.

# Hide the nginx version in Server headers and default error pages.
server_tokens off;

# ─── Request-header + body hygiene ──────────────────────────────────────────
# Reject requests whose header block is unreasonably large or slow to arrive.
# Combined with `client_max_body_size` in each location block, this caps the
# slowloris attack surface and the per-connection memory cost.
# NOTE: `keepalive_timeout` is set in the upstream nginx.conf's http{} block,
#   so we don't redefine it here to avoid a duplicate-directive error.
client_header_timeout 10s;
client_body_timeout   30s;
send_timeout          30s;
large_client_header_buffers 4 8k;

# Disable emitting the outbound Server header entirely if the more_clear_headers
# module is available. Leave commented unless nginx-extras is in the image.
# more_clear_headers 'Server';

# Trust X-Forwarded-For only from known reverse proxies. Without this nginx
# will accept any client-supplied X-Forwarded-For, making it trivial to defeat
# per-IP rate limits and audit logging. Adjust these CIDRs to match your
# actual edge — add Cloudflare / ALB ranges if you sit behind either.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
# set_real_ip_from 127.0.0.1/32;  # uncomment if nginx sits behind local LB
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# ─── TLS hardening (applies to every `ssl on` server{} below) ───────────────
# Only TLS 1.2+ with modern ciphers. TLS 1.0/1.1 are disabled.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;
# Enable OCSP stapling (requires ssl_trusted_certificate to contain the full chain).
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
resolver_timeout 5s;

# ─── Rate-limit + connection-count zones ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
# Aggressive auth limiter: 5 requests per minute per IP against brute force
# and account enumeration on magic-link endpoints.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
# Webhook limiter protects /api/stripe/webhook from abuse. Traffic is already
# IP-allowlisted in the app/Lambda, but this layer adds a cheap per-IP cap.
limit_req_zone $binary_remote_addr zone=webhook:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Return 429 (not the nginx default 503) when rate limits fire so clients can
# retry sanely.
limit_req_status 429;
limit_conn_status 429;

# ─── HTTP method allowlist ──────────────────────────────────────────────────
# Only accept methods the app actually handles. Anything else → 405.
# Maintained as a map so it can be reused across server{} blocks.
map $request_method $method_allowed {
    default        0;
    GET            1;
    HEAD           1;
    POST           1;
    PUT            1;
    PATCH          1;
    DELETE         1;
    OPTIONS        1;
}

upstream nextjs_upstream {
    server website:3000;
    keepalive 32;
}

# ─── Default server: reject unknown Host / direct-IP access ─────────────────
# Protects against host-header attacks (Auth.js trustHost=true relies on a
# sane Host), and hides that *anything* lives here from random scanners.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate /run/secrets/ssl_cert;
    ssl_certificate_key /run/secrets/ssl_key;
    ssl_reject_handshake on;
}

# ─── Real app: HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    server_name fakefourrecords.com www.fakefourrecords.com;
    # Serve ACME HTTP-01 challenges without redirect
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }
    return 301 https://$host$request_uri;
}

# ─── Real app: HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fakefourrecords.com www.fakefourrecords.com;

    ssl_certificate /run/secrets/ssl_cert;
    ssl_certificate_key /run/secrets/ssl_key;

    # Also serve ACME path over HTTPS if needed
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    # Reject unsupported HTTP methods early (before any location match).
    if ($method_allowed = 0) {
        return 405;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # BREACH-safe: do not compress responses that set cookies or carry auth.
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/css
        text/javascript
        text/xml
        text/plain
        text/x-component
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/xhtml+xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Security headers — values aligned with next.config.ts to avoid conflicting duplicates.
    # X-XSS-Protection is intentionally omitted: it is deprecated by MDN and can introduce
    # XSS in legacy browsers (see https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection).
    # CSP is set in the Next.js app layer (next.config.ts) since it needs nonces per request.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Opt out of FLoC/Topics and related interest-based features.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Cross-origin isolation: allow the app's own frames (Stripe, Turnstile) while
    # denying everything else from cross-origin embedding.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Block all dotfile access (e.g. /.git/, /.env) — defense-in-depth.
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny common sensitive paths outright. If the app grew a static handler
    # that accidentally served one of these, nginx still blocks it.
    location ~* /(?:\.git|\.svn|\.hg|\.bzr|\.env(?:\.[^/]+)?|\.npmrc|\.pem|\.key|\.crt|\.cert|private_key\.pem|id_rsa|id_dsa|Dockerfile|docker-compose(?:\.[^/]+)?\.yml|prisma/schema\.prisma|pnpm-lock\.yaml|package-lock\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Default client max body size (for most requests)
    client_max_body_size 2m;

    # Cap concurrent connections per IP as a slowloris / resource-pin defense.
    limit_conn conn_per_ip 20;

    # ─── Stripe webhook: IP-allowlisted + signature-verified downstream ─────
    # Webhook body size is tiny; keep the body cap low. The route itself
    # enforces signature verification and IP allowlisting, this layer adds
    # defense-in-depth and caps request flooding.
    location = /api/stripe/webhook {
        client_max_body_size 256k;
        limit_req zone=webhook burst=10 nodelay;
        limit_conn conn_per_ip 5;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Auth endpoints: aggressive rate limit against enumeration/brute force ─
    location ~ ^/api/auth/(signin|callback|verify-request|signout|session) {
        limit_req zone=auth burst=2 nodelay;
        limit_conn conn_per_ip 4;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Track metadata endpoint - allow larger file uploads (500MB for audio files)
    location /api/tracks/metadata {
        client_max_body_size 500m;
        limit_req zone=upload burst=5 nodelay;
        limit_conn conn_per_ip 3;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        # Increased timeouts for large file processing
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        # Don't buffer large upload bodies in nginx memory.
        proxy_request_buffering off;
    }

    # Bulk track upload page — was 2048m (2GB). Halved to 1024m with per-IP
    # connection + rate caps so a hostile client can't tie up an uncapped
    # upstream worker by dripping a 2GB body for 120s. Adjust down further
    # once actual admin upload sizes are measured.
    location /admin/tracks/bulk {
        client_max_body_size 1024m;
        limit_req zone=upload burst=2 nodelay;
        limit_conn conn_per_ip 2;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        # Increased timeouts for bulk processing
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    # Digital format upload endpoint - allow up to 500MB (WAV/AIFF tracks up to 300MB)
    location ~ ^/api/releases/[^/]+/upload/[^/]+$ {
        client_max_body_size 500m;
        limit_req zone=upload burst=5 nodelay;
        limit_conn conn_per_ip 2;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        # Increased timeouts for large file uploads (route maxDuration=300s)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Bundle download endpoint - allow up to 5 minutes for large multi-format ZIPs
    location ~ ^/api/releases/[^/]+/download/bundle$ {
        limit_req zone=api burst=5 nodelay;
        limit_conn conn_per_ip 3;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        # Match route.ts maxDuration=300
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        # Bundle route streams SSE — disable nginx response buffering.
        proxy_buffering off;
    }

    # API routes with rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # All other requests
    location / {
        proxy_pass http://website:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
