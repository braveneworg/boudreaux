# gitleaks configuration.
#
# Extends the built-in default ruleset (so all standard secret detectors stay
# active) and allowlists the bio-generator Lambda's unit tests, which pass
# placeholder credentials (e.g. a literal "test-key" as the Gemini API key) to
# exercise the code paths. These are fixtures, not real secrets — the real Gemini
# key lives only in AWS SSM and is never committed.
[extend]
useDefault = true

[[allowlists]]
description = "bio-generator unit tests use placeholder credentials, not real secrets"
paths = ['''bio-generator/src/.*\.spec\.ts$''']

[[allowlists]]
description = "E2E test AUTH_SECRET is a hardcoded non-secret placeholder shared by the Playwright harness (config, global setup, disposable-session helper); the real AUTH_SECRET lives only in the deploy environment"
regexes = ['''e2e-test-secret-key-that-is-at-least-32-characters-long''']
