packages:
  - '.'
peerDependencyRules:
  allowedVersions:
    react: '^19.2.0'
    react-dom: '^19.2.0'
    nodemailer: '^9.0.1'
    # eslint-plugin-react and eslint-plugin-jsx-a11y have not yet published a release
    # declaring an ESLint 10 peer, but both run on v10 with the rules this repo enables
    # (the rule files using v10-removed APIs are all formatting rules we don't turn on).
    'eslint-plugin-react>eslint': '10'
    'eslint-plugin-jsx-a11y>eslint': '10'
    # Transitive only: eslint-import-resolver-typescript pulls in the legacy
    # eslint-plugin-import (we lint with eslint-plugin-import-x). Cosmetic peer.
    'eslint-plugin-import>eslint': '10'
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - core-js
  - esbuild
  - msw
  - prisma
  - sharp
  - unrs-resolver
overrides:
  esbuild@<0.28.1: ^0.28.1
  c12>magicast: ^0.3.5
  typescript-eslint: ^8.58.0
  '@typescript-eslint/utils': ^8.58.0
  '@typescript-eslint/typescript-estree': ^8.58.0
  '@typescript-eslint/tsconfig-utils': ^8.58.0
  '@typescript-eslint/project-service': ^8.58.0
  '@xmldom/xmldom': ^0.9.10
  lodash: 4.18.1
  vite: ~7.3.2
  defu: ^6.1.5
  picomatch: ^4.0.4
  effect: ^3.20.0
  flatted: ^3.4.2
  fast-uri@<3.1.2: ^3.1.2
  ip-address@<10.1.1: ^10.1.1
  hono@<4.12.25: ^4.12.25
  qs@>=6.11.1 <6.15.2: ^6.15.2
  path-to-regexp@>=8.0.0 <8.4.0: ^8.4.0
  brace-expansion@<1.1.16: ^1.1.16
  brace-expansion@>=2.0.0 <2.1.2: ^2.1.2
  brace-expansion@>=3.0.0 <5.0.7: ^5.0.7
  postcss@>=8.0.0 <8.5.10: ^8.5.10
  ws@>=8.0.0 <8.20.1: ^8.20.1
  undici@>=7.0.0 <7.28.0: ^7.28.0
  form-data@>=4.0.0 <4.0.6: ^4.0.6
  js-yaml@>=4.0.0 <4.3.0: ^4.3.0
shamefullyHoist: true
strictPeerDependencies: false
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msw: true
  prisma: true
  sharp: true
  unrs-resolver: true
