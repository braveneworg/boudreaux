name: 'Setup pnpm + Node.js'
description: 'Install pnpm and Node.js only — no dependency install. Use when you do not need node_modules (e.g. version-bump jobs).'

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      # No `version:` here — pnpm/action-setup reads the version from the
      # `packageManager` field in package.json. Pinning it in both places
      # causes ERR_PNPM_BAD_PM_VERSION when they drift.
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.18.0'
        cache: 'pnpm'
