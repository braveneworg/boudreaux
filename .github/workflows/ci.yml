name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────────────
  # Fast quality gate (~2–3 min). Tests only run after this passes, so a lint
  # failure cancels the shard jobs immediately without burning CI minutes.
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

  # ── Unit tests (sharded) ───────────────────────────────────────────────────
  # The 310-file suite is split into two parallel jobs. Each shard runs with
  # the vmThreads pool (≈3× faster than forks) and stores its results plus
  # coverage data in a Vitest blob artifact for the merge step.
  test:
    name: Unit Tests (Shard ${{ matrix.shard }}/2)
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run tests (shard ${{ matrix.shard }}/2)
        run: pnpm run test:shard --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          retention-days: 1
          if-no-files-found: warn

  # ── Merge shards → coverage ────────────────────────────────────────────────
  # Combines both blobs into a single coverage report, runs the regression
  # check, posts the PR comment, and updates badges on main.
  coverage:
    name: Coverage & Regression Check
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Download blob report (shard 1)
        uses: actions/download-artifact@v8
        with:
          name: vitest-blob-1
          path: .vitest-reports

      - name: Download blob report (shard 2)
        uses: actions/download-artifact@v8
        with:
          name: vitest-blob-2
          path: .vitest-reports

      - name: Verify blob reports
        run: ls -la .vitest-reports/

      - name: Merge reports and generate coverage
        run: pnpm run test:merge
        env:
          CI: true

      - name: Check coverage regression
        run: pnpm exec tsx scripts/check-coverage-regression.ts

      - name: Vitest Coverage Report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

      - name: Coverage Report Summary
        if: always()
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            STATEMENTS=$(cat ./coverage/coverage-summary.json | jq '.total.statements.pct')
            BRANCHES=$(cat ./coverage/coverage-summary.json | jq '.total.branches.pct')
            FUNCTIONS=$(cat ./coverage/coverage-summary.json | jq '.total.functions.pct')
            LINES=$(cat ./coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Extract coverage percentage
        id: coverage-pct
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            PCT=$(cat ./coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "pct=${PCT}" >> $GITHUB_OUTPUT
          else
            echo "pct=0" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PCT="${{ steps.coverage-pct.outputs.pct }}"
          # Determine badge color based on coverage percentage
          if [ "$(echo "$PCT >= 90" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$PCT >= 80" | bc)" -eq 1 ]; then
            COLOR="green"
          elif [ "$(echo "$PCT >= 70" | bc)" -eq 1 ]; then
            COLOR="yellowgreen"
          elif [ "$(echo "$PCT >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          elif [ "$(echo "$PCT >= 50" | bc)" -eq 1 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi
          BADGE_JSON="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}"
          # Update coverage badge in public gist
          echo "$BADGE_JSON" > /tmp/coverage-badge.json
          gh gist edit dfb9819d47ec197bb8df7c3165cf472d /tmp/coverage-badge.json
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Update version badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(jq -r '.version' package.json)
          BADGE_JSON="{\"schemaVersion\":1,\"label\":\"version\",\"message\":\"v${VERSION}\",\"color\":\"blue\"}"
          echo "$BADGE_JSON" > /tmp/version-badge.json
          gh gist edit 60abe6ab220986485503670eafd1ec2e /tmp/version-badge.json
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

  # ── E2E tests (sharded) ───────────────────────────────────────────────────
  # The 16-file Playwright suite is split into 3 parallel shards. Each shard
  # runs against the pre-built standalone server + a MongoDB replica set
  # service container. Blob reports are uploaded for the merge step.
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/3)
    needs: [quality, build-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      E2E_DATABASE_URL: mongodb://localhost:27018/boudreaux-e2e?replicaSet=rs0
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo-e2e \
            -p 27018:27018 \
            -e MONGO_INITDB_DATABASE=boudreaux-e2e \
            mongo:7 mongod --replSet rs0 --bind_ip_all --port 27018

          # Wait for mongod to accept connections
          for i in $(seq 1 30); do
            if docker exec mongo-e2e mongosh --port 27018 --eval "db.runCommand({ping:1})" 2>/dev/null; then
              echo "MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done

          # Initiate replica set (ignore "already initialized" errors)
          docker exec mongo-e2e mongosh --port 27018 --eval "
            try { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27018'}]}) }
            catch(e) { if (e.codeName !== 'AlreadyInitialized') throw e; }
          "

          # Wait for primary election
          for i in $(seq 1 15); do
            PRIMARY=$(docker exec mongo-e2e mongosh --port 27018 --quiet --eval "rs.isMaster().ismaster" 2>/dev/null || echo "false")
            if [ "$PRIMARY" = "true" ]; then
              echo "Replica set primary elected"
              break
            fi
            echo "Waiting for primary election... ($i/15)"
            sleep 2
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build-e2e
          path: .

      - name: Extract build artifact
        run: |
          tar -xzf next-build-e2e.tar.gz
          # Standalone server needs static files alongside it
          cp -r .next/static .next/standalone/.next/static
          # Copy public directory for standalone server
          if [ -d public ]; then
            cp -r public .next/standalone/public
          fi

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/3
        env:
          CI: true
          E2E_DATABASE_URL: mongodb://localhost:27018/boudreaux-e2e?replicaSet=rs0
          SKIP_ENV_VALIDATION: "true"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-blob-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.shard }}
          path: e2e/test-results/
          retention-days: 3
          if-no-files-found: ignore

  # ── Merge E2E shard reports ─────────────────────────────────────────────
  e2e-report:
    name: E2E Report
    needs: [e2e]
    if: always() && needs.e2e.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Download blob report (shard 1)
        uses: actions/download-artifact@v8
        with:
          name: playwright-blob-1
          path: all-blob-reports

      - name: Download blob report (shard 2)
        uses: actions/download-artifact@v8
        with:
          name: playwright-blob-2
          path: all-blob-reports

      - name: Download blob report (shard 3)
        uses: actions/download-artifact@v8
        with:
          name: playwright-blob-3
          path: all-blob-reports

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: E2E Summary
        if: always()
        run: |
          if [ "${{ needs.e2e.result }}" = "success" ]; then
            echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All 3 shards passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more shards failed. See the [Playwright Report](../artifacts) for details." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Next.js build (E2E) ────────────────────────────────────────────────────
  # Builds without CDN asset prefix and with E2E-specific env vars so the
  # standalone server can serve assets locally during Playwright tests.
  build-e2e:
    name: Build Next.js (E2E)
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-e2e-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-next-e2e-

      - name: Build Next.js (E2E)
        env:
          SKIP_ENV_VALIDATION: "true"
          SKIP_CDN_ASSET_PREFIX: "true"
          DATABASE_URL: "mongodb://localhost:27017/build-placeholder"
          NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: "1x00000000000000000000AA"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_STRIPE_PRICE_MINIMUM: "500"
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA: "1000"
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA: "2000"
          NEXT_PUBLIC_BANNER_INTERVAL: "1000"
          NODE_ENV: "production"
          AUTH_SECRET: "e2e-test-secret-key-that-is-at-least-32-characters-long"
          AUTH_URL: "http://localhost:3000"
        run: pnpm exec next build --webpack

      - name: Package standalone output
        run: |
          tar -czf next-build-e2e.tar.gz .next/standalone .next/static .next/BUILD_ID
          ls -lh next-build-e2e.tar.gz

      - name: Upload E2E build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build-e2e
          path: next-build-e2e.tar.gz
          retention-days: 1
          if-no-files-found: error

  # ── Next.js build (deploy) ───────────────────────────────────────────────
  # Production build with CDN asset prefix for the deploy workflow.
  build:
    name: Build Next.js app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Build Next.js
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "mongodb://localhost:27017/build-placeholder"
          NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_SITE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PRICE_MINIMUM: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_MINIMUM }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA }}
          NEXT_PUBLIC_CDN_DOMAIN: ${{ secrets.NEXT_PUBLIC_CDN_DOMAIN }}
          NODE_ENV: "production"
          AUTH_SECRET: "test-secret-key-for-testing-purposes-only"
          AUTH_URL: "http://localhost:3000"
        run: pnpm exec next build --webpack

      - name: Package Next.js output for deploy workflow (standalone + static only)
        run: |
          if [ ! -d ".next" ]; then
            echo "Error: .next directory not found!"
            exit 1
          fi
          if [ ! -d ".next/standalone" ] || [ ! -d ".next/static" ]; then
            echo "Error: expected .next/standalone and .next/static to exist"
            ls -la .next
            exit 1
          fi
          tar -czf next-build.tar.gz .next/standalone .next/static .next/BUILD_ID
          ls -lh next-build.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: next-build.tar.gz
          retention-days: 1
          if-no-files-found: error
