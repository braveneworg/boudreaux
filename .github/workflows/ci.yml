name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────────────
  # Fast quality gate (~2–3 min). Tests only run after this passes, so a lint
  # failure cancels the shard jobs immediately without burning CI minutes.
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

  # ── Unit tests (sharded) ───────────────────────────────────────────────────
  # The 310-file suite is split into two parallel jobs. Each shard runs with
  # the vmThreads pool (≈3× faster than forks) and stores its results plus
  # coverage data in a Vitest blob artifact for the merge step.
  test:
    name: Unit Tests (Shard ${{ matrix.shard }}/2)
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run tests (shard ${{ matrix.shard }}/2)
        run: pnpm run test:shard -- --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Rename blob for unique artifact naming
        if: always()
        run: |
          if [ -f .vitest-reports/blob.json ]; then
            mv .vitest-reports/blob.json .vitest-reports/blob-${{ matrix.shard }}.json
          fi

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/blob-${{ matrix.shard }}.json
          retention-days: 1
          if-no-files-found: warn

  # ── Merge shards → coverage ────────────────────────────────────────────────
  # Combines both blobs into a single coverage report, runs the regression
  # check, posts the PR comment, and updates badges on main.
  coverage:
    name: Coverage & Regression Check
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge reports and generate coverage
        run: pnpm run test:merge
        env:
          CI: true

      - name: Check coverage regression
        run: pnpm exec tsx scripts/check-coverage-regression.ts

      - name: Vitest Coverage Report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

      - name: Coverage Report Summary
        if: always()
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            STATEMENTS=$(cat ./coverage/coverage-summary.json | jq '.total.statements.pct')
            BRANCHES=$(cat ./coverage/coverage-summary.json | jq '.total.branches.pct')
            FUNCTIONS=$(cat ./coverage/coverage-summary.json | jq '.total.functions.pct')
            LINES=$(cat ./coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Extract coverage percentage
        id: coverage-pct
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -f "./coverage/coverage-summary.json" ]; then
            PCT=$(cat ./coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "pct=${PCT}" >> $GITHUB_OUTPUT
          else
            echo "pct=0" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PCT="${{ steps.coverage-pct.outputs.pct }}"
          # Determine badge color based on coverage percentage
          if [ "$(echo "$PCT >= 90" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$PCT >= 80" | bc)" -eq 1 ]; then
            COLOR="green"
          elif [ "$(echo "$PCT >= 70" | bc)" -eq 1 ]; then
            COLOR="yellowgreen"
          elif [ "$(echo "$PCT >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          elif [ "$(echo "$PCT >= 50" | bc)" -eq 1 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi
          BADGE_JSON="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}"
          # Update coverage badge in public gist
          echo "$BADGE_JSON" > /tmp/coverage-badge.json
          gh gist edit dfb9819d47ec197bb8df7c3165cf472d /tmp/coverage-badge.json
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Update version badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(jq -r '.version' package.json)
          BADGE_JSON="{\"schemaVersion\":1,\"label\":\"version\",\"message\":\"v${VERSION}\",\"color\":\"blue\"}"
          echo "$BADGE_JSON" > /tmp/version-badge.json
          gh gist edit 60abe6ab220986485503670eafd1ec2e /tmp/version-badge.json
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

  # ── Next.js build ──────────────────────────────────────────────────────────
  build:
    name: Build Next.js app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Build Next.js
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "mongodb://localhost:27017/build-placeholder"
          NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_SITE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PRICE_MINIMUM: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_MINIMUM }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA }}
          NODE_ENV: "production"
          AUTH_SECRET: "test-secret-key-for-testing-purposes-only"
          AUTH_URL: "http://localhost:3000"
        run: pnpm exec next build --webpack

      - name: Package Next.js output for deploy workflow (standalone + static only)
        run: |
          if [ ! -d ".next" ]; then
            echo "Error: .next directory not found!"
            exit 1
          fi
          if [ ! -d ".next/standalone" ] || [ ! -d ".next/static" ]; then
            echo "Error: expected .next/standalone and .next/static to exist"
            ls -la .next
            exit 1
          fi
          tar -czf next-build.tar.gz .next/standalone .next/static .next/BUILD_ID
          ls -lh next-build.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: next-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  # ── E2E tests (sharded) ────────────────────────────────────────────────────
  # The E2E suite is split across 3 parallel runners. Each shard runs its own
  # MongoDB replica set, builds Next.js, and executes a subset of test files.
  # Blob reports are uploaded for the merge step.
  e2e:
    name: E2E Tests (Shard ${{ matrix.shardIndex }}/3)
    runs-on: ubuntu-latest
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Start MongoDB replica set
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps only (browsers cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-e2e-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-next-e2e-cache-

      - name: Build Next.js for E2E
        env:
          SKIP_ENV_VALIDATION: "true"
          SKIP_CDN_ASSET_PREFIX: "true"
          DATABASE_URL: "mongodb://localhost:27018/boudreaux-e2e?directConnection=true"
          NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: "1x00000000000000000000AA"
          NEXT_PUBLIC_CLOUDFLARE_TEST_SITE_KEY: "1x00000000000000000000AA"
          NEXT_PUBLIC_BANNER_INTERVAL: "1000"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PRICE_MINIMUM: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_MINIMUM }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA }}
          NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_EXTRA_EXTRA }}
          NODE_ENV: "production"
          AUTH_SECRET: "e2e-test-secret-key-that-is-at-least-32-characters-long"
          AUTH_URL: "http://localhost:3000"
        run: pnpm exec next build --webpack

      - name: Prepare standalone server assets
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d "public" ]; then cp -r public .next/standalone/public; fi

      - name: Run E2E Tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: pnpm run e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          DATABASE_URL: "mongodb://localhost:27018/boudreaux-e2e?directConnection=true"
          AUTH_SECRET: "e2e-test-secret-key-that-is-at-least-32-characters-long"
          AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLOUDFLARE_SITE_KEY: "1x00000000000000000000AA"
          SKIP_ENV_VALIDATION: "true"
          NODE_ENV: "test"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_TEST_OUTPUT: "/tmp/playwright-results"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-results-${{ matrix.shardIndex }}
          path: /tmp/playwright-results/
          retention-days: 7

  # ── Merge E2E reports ─────────────────────────────────────────────────────
  # Combines blob reports from all shards into a single HTML report.
  e2e-report:
    name: Merge E2E Reports
    if: ${{ !cancelled() }}
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: e2e-blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
