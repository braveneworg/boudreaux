name: Deploy Stripe Webhook

on:
  push:
    branches:
      - main
    paths:
      - "stripe-webhook/**"
      - ".github/workflows/deploy-stripe-webhook.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install dependencies
        working-directory: stripe-webhook
        run: npm ci

      - name: Install esbuild globally
        run: npm install -g esbuild

      - name: Generate Prisma client
        working-directory: stripe-webhook
        run: ./node_modules/.bin/prisma generate --schema=../prisma/schema.prisma

      - name: Copy Prisma client and engine to layer
        working-directory: stripe-webhook
        run: |
          mkdir -p layers/prisma/nodejs/node_modules/.prisma/client
          mkdir -p layers/prisma/nodejs/node_modules/@prisma/client

          cp -r node_modules/.prisma/client/. \
            layers/prisma/nodejs/node_modules/.prisma/client/

          cp -r node_modules/@prisma/client/. \
            layers/prisma/nodejs/node_modules/@prisma/client/

      - name: SAM build
        working-directory: stripe-webhook
        run: sam build

      - name: Ensure SAM artifact bucket exists
        run: |
          BUCKET="fakefour-sam-artifacts-us-east-1"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$BUCKET" --region us-east-1
          fi

      - name: SAM deploy
        working-directory: stripe-webhook
        run: |
          sam deploy \
            --s3-bucket fakefour-sam-artifacts-us-east-1 \
            --s3-prefix fakefour-stripe-webhook \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --stack-name fakefour-stripe-webhook \
            --region us-east-1 \
            --parameter-overrides Environment=production

      - name: Print webhook URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name fakefour-stripe-webhook \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text
