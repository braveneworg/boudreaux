name: Deploy Stripe Webhook

on:
  push:
    branches:
      - main
    paths:
      - "stripe-webhook/**"
      - "prisma/**"
      - ".github/workflows/deploy-stripe-webhook.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.12.4 --activate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install dependencies
        working-directory: stripe-webhook
        run: pnpm install --frozen-lockfile

      - name: Install esbuild globally
        run: npm install -g esbuild

      - name: Generate Prisma client
        working-directory: stripe-webhook
        run: pnpm exec prisma generate --schema=../prisma/schema.prisma

      - name: Copy Prisma client and engine to layer
        working-directory: stripe-webhook
        run: |
          # Resolve the real (de-symlinked) @prisma/client install dir. With pnpm
          # this lives inside the virtual store: node_modules/.pnpm/@prisma+client@.../node_modules/@prisma/client
          PRISMA_CLIENT_PKG=$(node -e "console.log(require.resolve('@prisma/client/package.json'))")
          PRISMA_CLIENT_DIR=$(dirname "$(readlink -f "$PRISMA_CLIENT_PKG")")
          # .prisma/client is generated as a sibling of @prisma/client in the same node_modules
          PRISMA_DOT_DIR="$(dirname "$(dirname "$PRISMA_CLIENT_DIR")")/.prisma/client"

          # Fallback: search the workspace for a .prisma/client directory containing
          # the linux-arm64 query engine if the path above does not exist.
          if [ ! -d "$PRISMA_DOT_DIR" ]; then
            echo "Sibling .prisma/client not found at $PRISMA_DOT_DIR, falling back to find"
            PRISMA_DOT_DIR=$(find "$(pwd)/.." -type d -path '*/.prisma/client' \
              -exec test -e '{}/package.json' \; -print 2>/dev/null | head -n 1)
          fi

          if [ -z "$PRISMA_DOT_DIR" ] || [ ! -d "$PRISMA_DOT_DIR" ]; then
            echo "ERROR: could not locate generated .prisma/client directory."
            echo "Did 'prisma generate' run successfully?"
            exit 1
          fi

          echo "Resolved @prisma/client: $PRISMA_CLIENT_DIR"
          echo "Resolved .prisma/client: $PRISMA_DOT_DIR"

          mkdir -p layers/prisma/nodejs/node_modules/.prisma/client
          mkdir -p layers/prisma/nodejs/node_modules/@prisma/client

          cp -rL "$PRISMA_DOT_DIR/." \
            layers/prisma/nodejs/node_modules/.prisma/client/

          cp -rL "$PRISMA_CLIENT_DIR/." \
            layers/prisma/nodejs/node_modules/@prisma/client/

          # Verify the linux-arm64 engine made it into the layer
          ls layers/prisma/nodejs/node_modules/.prisma/client/ | grep -E 'libquery_engine.*linux-arm64' \
            || (echo "ERROR: linux-arm64 query engine not found in layer" && exit 1)

      - name: SAM build
        working-directory: stripe-webhook
        run: sam build

      - name: Ensure SAM artifact bucket exists
        run: |
          BUCKET="fakefour-sam-artifacts-us-east-1"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$BUCKET" --region us-east-1
          fi

      - name: SAM deploy
        working-directory: stripe-webhook
        run: |
          sam deploy \
            --s3-bucket fakefour-sam-artifacts-us-east-1 \
            --s3-prefix fakefour-stripe-webhook \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --stack-name fakefour-stripe-webhook \
            --region us-east-1 \
            --parameter-overrides Environment=production

      - name: Print webhook URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name fakefour-stripe-webhook \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text
