AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fake Four Records - Stripe webhook handler

Globals:
  Function:
    Timeout: 29
    MemorySize: 512
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_ENV: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  AwsSesRegion:
    Type: String
    Description: AWS region used for SES email sending
  BaseUrl:
    Type: String
    Description: Public base URL used in email links
  EmailFrom:
    Type: String
    Description: From address used by SES
  SesIdentityArn:
    Type: String
    Description: ARN of the verified SES identity used to send email
  StripePriceMinimum:
    Type: String
    Description: Stripe price ID for the minimum (base) tier
  StripePriceExtra:
    Type: String
    Description: Stripe price ID for the extra tier
  StripePriceExtraExtra:
    Type: String
    Description: Stripe price ID for the extra-extra tier
  StripeSecretKey:
    Type: String
    Description: Stripe secret API key
    NoEcho: true
  StripeWebhookSecret:
    Type: String
    Description: Stripe webhook signing secret
    NoEcho: true
  DatabaseUrl:
    Type: String
    Description: MongoDB connection URL for Prisma
    NoEcho: true
  StripeWebhookIpRanges:
    Type: String
    Description: Comma-separated list of Stripe webhook source IP/CIDR ranges

Resources:
  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambdaHandler
      Description: Handles Stripe webhook events for Fake Four Records
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: !Ref SesIdentityArn
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          DATABASE_URL: !Ref DatabaseUrl
          STRIPE_WEBHOOK_IP_RANGES: !Ref StripeWebhookIpRanges
          EMAIL_FROM: !Ref EmailFrom
          BASE_URL: !Ref BaseUrl
          STRIPE_PRICE_MINIMUM: !Ref StripePriceMinimum
          STRIPE_PRICE_EXTRA: !Ref StripePriceExtra
          STRIPE_PRICE_EXTRA_EXTRA: !Ref StripePriceExtraExtra
          AWS_SES_REGION: !Ref AwsSesRegion
      Layers:
        - !Ref PrismaEngineLayer
      Events:
        StripeWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref StripeWebhookApi
            Path: /webhooks/stripe
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2024
        Format: esm
        OutExtension:
          - .js=.mjs
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - '@prisma/client'
          - '@aws-sdk/*'

  StripeWebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: Stripe webhook endpoint for Fake Four Records

  PrismaEngineLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: prisma-engine-arm64
      Description: Prisma query engine binary for Lambda arm64
      ContentUri: layers/prisma/
      CompatibleRuntimes:
        - nodejs24.x
      CompatibleArchitectures:
        - arm64

Outputs:
  WebhookUrl:
    Description: Paste this into your Stripe dashboard webhook settings
    Value: !Sub >-
      https://${StripeWebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhooks/stripe
  FunctionArn:
    Value: !GetAtt StripeWebhookFunction.Arn
