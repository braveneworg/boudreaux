AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fake Four Records - Stripe webhook handler

Globals:
  Function:
    Timeout: 29
    MemorySize: 512
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_ENV: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

Resources:
  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambdaHandler
      Description: Handles Stripe webhook events for Fake Four Records
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '{{resolve:ssm:/fakefour/ses-identity-arn}}'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/stripe/secret-key'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/stripe/webhook-secret'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/database-url'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Environment:
        Variables:
          SSM_PATH_STRIPE_SECRET_KEY: '/fakefour/stripe/secret-key'
          SSM_PATH_STRIPE_WEBHOOK_SECRET: '/fakefour/stripe/webhook-secret'
          SSM_PATH_DATABASE_URL: '/fakefour/database-url'
          EMAIL_FROM: '{{resolve:ssm:/fakefour/email-from}}'
          BASE_URL: '{{resolve:ssm:/fakefour/base-url}}'
          STRIPE_PRICE_MINIMUM: '{{resolve:ssm:/fakefour/stripe/price-minimum}}'
          STRIPE_PRICE_EXTRA: '{{resolve:ssm:/fakefour/stripe/price-extra}}'
          STRIPE_PRICE_EXTRA_EXTRA: '{{resolve:ssm:/fakefour/stripe/price-extra-extra}}'
          AWS_SES_REGION: '{{resolve:ssm:/fakefour/aws-ses-region}}'
          STRIPE_WEBHOOK_IP_RANGES: '{{resolve:ssm:/fakefour/stripe/webhook-ip-ranges}}'
      Layers:
        - !Ref PrismaEngineLayer
      Events:
        StripeWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref StripeWebhookApi
            Path: /webhooks/stripe
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2024
        Format: esm
        OutExtension:
          - .js=.mjs
        Sourcemap: true
        EntryPoints:
          - handler.ts
        External:
          - '@prisma/client'
          - '@aws-sdk/*'

  StripeWebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: Stripe webhook endpoint for Fake Four Records

  RefreshIpAllowlistFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: refresh-ip-allowlist-handler.handler
      Description: Refreshes the Stripe webhook IP allowlist from stripe.com
      Timeout: 15
      MemorySize: 256
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fakefour/stripe/webhook-ip-ranges'
      Environment:
        Variables:
          SSM_PARAMETER_PATH: /fakefour/stripe/webhook-ip-ranges
      Events:
        DailyRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Refresh Stripe webhook IP allowlist daily
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2024
        Format: esm
        OutExtension:
          - .js=.mjs
        Sourcemap: true
        EntryPoints:
          - refresh-ip-allowlist-handler.ts
        External:
          - '@aws-sdk/*'

  RefreshIpAllowlistErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Stripe webhook IP allowlist refresh Lambda is failing
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref RefreshIpAllowlistFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  PrismaEngineLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: prisma-engine-arm64
      Description: Prisma query engine binary for Lambda arm64
      ContentUri: layers/prisma/
      CompatibleRuntimes:
        - nodejs24.x
      CompatibleArchitectures:
        - arm64

Outputs:
  WebhookUrl:
    Description: Paste this into your Stripe dashboard webhook settings
    Value: !Sub >-
      https://${StripeWebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhooks/stripe
  FunctionArn:
    Value: !GetAtt StripeWebhookFunction.Arn
