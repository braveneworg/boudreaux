apiVersion: 1

# The first deploy provisioned this datasource without an explicit uid;
# Grafana cannot change the uid of an existing provisioned datasource
# (boot fails with "data source not found"). Delete by name so the entry
# below recreates it with the stable uid. No-op on fresh volumes.
deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - name: Loki
    type: loki
    # Stable uid so provisioned alert rules and dashboards can reference it
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
